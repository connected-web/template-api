name: Validate OIDC Connection
on:
  workflow_dispatch:
    inputs:
      account:
        description: "The AWS account alias to verify"
        required: true
        type: choice
        options:
        - connected-web-dev
        - connected-web-prod
        default: 'connected-web-dev'

permissions:
  id-token: write # This is required for OIDC
  contents: write # Required for repository checkout
  pull-requests: write # This is required to write comments on the Pull Request

jobs:
  deploy:
    name: "Validate OIDC"
    runs-on: ubuntu-latest
    env:
      CWEB_ACCOUNTS_DIR: ${{ github.workspace }}/.github/workflows/accounts
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node JS LTS
        uses: actions/setup-node@v5
        with:
          node-version: 20.x
            
      - name: Install npm dependencies
        run: npm install

      - name: Install cweb CLI
        run: npm install -g @connected-web/cweb

      - name: Resolve profile from account alias
        run: |
          case "${{ github.event.inputs.account }}" in
            connected-web-dev)
              echo "TARGET_PROFILE=dev" >> "$GITHUB_ENV"
              ;;
            connected-web-prod)
              echo "TARGET_PROFILE=prod" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported account alias: ${{ github.event.inputs.account }}" >&2
              exit 1
              ;;
          esac

      # Authorise for target account
      - name: Resolve account config from cweb profile
        run: cweb configure -p "$TARGET_PROFILE" --write-github-env

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        env:
          AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ConnectedWebGithub-template-api
          role-session-name: ${{ github.event.repository.name }}
          role-duration-seconds: 900

      # List stacks in account
      - name: List infrastructure using the AWS CLI
        run: aws --region eu-west-2 cloudformation list-stacks --output table
