name: Check PR
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write

jobs:
  test-cdk-api:
    name: Test CDK API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node JS LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  package-deploy-dev:
    name: Package Deploy (dev)
    needs: ['test-cdk-api']
    runs-on: ubuntu-latest
    environment: dev
    env:
      NODE_AUTH_TOKEN: ${{ secrets.CONNECTED_WEB_PACKAGES_TOKEN }}
      CWEB_CLIENT_ID: ${{ secrets.CWEB_CLIENT_ID }}
      CWEB_CLIENT_SECRET: ${{ secrets.CWEB_CLIENT_SECRET }}
      TARGET_ACCOUNT: connected-web-dev
      TARGET_PROFILE: dev
      TARGET_INSTANCE_ID: test-db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node JS LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://npm.pkg.github.com
          scope: '@connected-web'

      - name: Install dependencies
        run: npm ci

      - name: Install cweb CLI
        run: npm install -g @connected-web/cweb

      - name: Verify machine credentials are configured
        run: |
          set -euo pipefail
          if [ -z "${CWEB_CLIENT_ID:-}" ] || [ -z "${CWEB_CLIENT_SECRET:-}" ]; then
            echo "Missing CWEB_CLIENT_ID/CWEB_CLIENT_SECRET for CI machine login." >&2
            echo "Bootstrap once from an operator workstation, then set GitHub secrets." >&2
            echo "Example: cweb repo bootstrap -p dev --org connected-web --repo template-api --env dev" >&2
            exit 1
          fi

      - name: Resolve pre-release package version
        run: echo "PACKAGE_VERSION=0.0.0-pr.${{ github.event.pull_request.number || github.run_number }}.${{ github.run_attempt }}" >> "$GITHUB_ENV"

      - name: Read account config
        working-directory: ./.github/workflows/scripts
        run: sh ./setupGithubEnvironment.sh "$TARGET_ACCOUNT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ConnectedWebGithub-template-api
          role-session-name: template-api-pr-check
          role-duration-seconds: 3600

      - name: Resolve Cognito user pool id
        run: |
          set -euo pipefail
          ACCOUNT_CONFIG_JSON="$(echo "$AWS_ACCOUNT_CONFIG" | base64 -d)"
          USER_POOL_ID="$(jq -r '.identity.verifiers[0].userPoolId // empty' <<<"$ACCOUNT_CONFIG_JSON")"
          if [ -z "$USER_POOL_ID" ]; then
            echo "Unable to resolve identity.verifiers[0].userPoolId from AWS_ACCOUNT_CONFIG" >&2
            exit 1
          fi

          echo "CWEB_USER_POOL_ID=$USER_POOL_ID" >> "$GITHUB_ENV"

      - name: Login cweb machine identity
        run: cweb login -p "$TARGET_PROFILE" --user-pool-id "$CWEB_USER_POOL_ID" --get-access-token --machine > /dev/null

      - name: Load management build context
        run: cweb -p "$TARGET_PROFILE" --user-pool-id "$CWEB_USER_POOL_ID" configure --write-github-env

      - name: Resolve deploy config
        run: |
          set -euo pipefail
          ACCOUNT_CONFIG_JSON="$(echo "$AWS_ACCOUNT_CONFIG" | base64 -d)"
          AUTHORIZER_ARN="${IDENTITY_AUTHORIZER_ARN:-}"
          if [ -z "$AUTHORIZER_ARN" ]; then
            AUTHORIZER_ARN="$(jq -r '.identity.authorizerArn // empty' <<<"$ACCOUNT_CONFIG_JSON")"
          fi
          HOSTED_ZONE_DOMAIN="$(jq -r '.hostedZoneDomain // empty' <<<"$ACCOUNT_CONFIG_JSON")"

          if [ -z "$AUTHORIZER_ARN" ] || [ -z "$HOSTED_ZONE_DOMAIN" ]; then
            echo "Unable to resolve deploy config values (IDENTITY_AUTHORIZER_ARN / hosted zone)." >&2
            exit 1
          fi

          echo "DEPLOY_CONFIG={\"Subdomain\":\"$TARGET_INSTANCE_ID\",\"HostedZoneDomain\":\"$HOSTED_ZONE_DOMAIN\",\"IDENTITY_AUTHORIZER_ARN\":\"$AUTHORIZER_ARN\"}" >> "$GITHUB_ENV"

      - name: Pack template-api package
        run: cweb -p "$TARGET_PROFILE" --user-pool-id "$CWEB_USER_POOL_ID" package pack --component template-api --version "$PACKAGE_VERSION"

      - name: Publish template-api package
        run: cweb -p "$TARGET_PROFILE" --user-pool-id "$CWEB_USER_POOL_ID" package publish --component template-api --version "$PACKAGE_VERSION"

      - name: Deploy template-api package
        run: |
          cweb -p "$TARGET_PROFILE" --user-pool-id "$CWEB_USER_POOL_ID" package deploy \
            --host remote \
            --component template-api \
            --version "$PACKAGE_VERSION" \
            --instance-id "$TARGET_INSTANCE_ID" \
            --config "$DEPLOY_CONFIG"

  post-deployment-tests:
    name: Post-deployment Tests for API
    needs: ['package-deploy-dev']
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node JS LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install npm dependencies (root)
        run: npm ci

      - name: Install npm dependencies (api)
        run: npm install
        working-directory: ./api

      - name: Run post-deployment tests
        working-directory: ./api
        run: npm run test:post-deployment
        env:
          POST_DEPLOYMENT_SERVER_DOMAIN: https://test-db.dev.connected-web.services
          POST_DEPLOYMENT_AUTH_URL: https://connected-web-dev.auth.eu-west-2.amazoncognito.com/oauth2/token
          POST_DEPLOYMENT_CLIENT_ID: ${{ secrets.POST_DEPLOYMENT_CLIENT_ID }}
          POST_DEPLOYMENT_CLIENT_SECRET: ${{ secrets.POST_DEPLOYMENT_CLIENT_SECRET }}

  publish-npm-client:
    name: Publish NPM Client
    needs: ['post-deployment-tests']
    uses: ./.github/workflows/publish-npm-client.yml
    secrets: inherit
