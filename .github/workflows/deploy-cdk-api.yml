name: Deploy CDK API
on:
  workflow_dispatch:
    inputs:
      account:
        description: "The AWS account alias to deploy to"
        required: true
        type: choice
        options:
        - connected-web-dev
        - connected-web-dev-with-headers
        - connected-web-prod
        default: 'connected-web-dev'
  workflow_call:
    inputs:
      account:
        description: "The AWS account alias to deploy to"
        type: string
        default: 'connected-web-dev'

permissions:
  id-token: write # This is required for OIDC
  contents: write # Required for repository checkout
  pull-requests: write # This is required to write comments on the Pull Request

jobs:
  deploy:
    name: Deploy CDK API
    runs-on: ubuntu-latest
    env:
      CWEB_ACCOUNTS_DIR: ${{ github.workspace }}/.github/workflows/accounts
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node JS LTS
        uses: actions/setup-node@v5
        with:
          node-version: 20.x
        
      - name: Install npm dependencies
        run: npm install

      - name: Install cweb CLI
        run: npm install -g @connected-web/cweb

      - name: Resolve profile from account alias
        run: |
          case "${{ inputs.account || github.event.inputs.account || 'connected-web-dev' }}" in
            connected-web-dev|connected-web-dev-with-headers)
              echo "TARGET_PROFILE=dev" >> "$GITHUB_ENV"
              ;;
            connected-web-prod)
              echo "TARGET_PROFILE=prod" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported account alias: ${{ inputs.account || github.event.inputs.account || 'connected-web-dev' }}" >&2
              exit 1
              ;;
          esac

      # Authorise for target account
      - name: Resolve account config from cweb profile
        run: cweb configure -p "$TARGET_PROFILE" --write-github-env

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        env:
          AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ConnectedWebGithub-template-api
          role-session-name: ${{ github.event.repository.name }}
          role-duration-seconds: 900
      
      # CDK API Project
      - name: Install npm dependencies
        run: npm install
        working-directory: ./api

      - name: Deploy the CDK Stack
        run: npm run deploy -- --require-approval never
        env:
          CREATE_CNAME_RECORD: true
          OPENAPI_REST_API_REPORT_SUMMARY: true
        working-directory: ./api
