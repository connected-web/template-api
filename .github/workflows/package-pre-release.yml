name: Package Pre-release

on:
  workflow_dispatch:
    inputs:
      account:
        description: "Target AWS account alias"
        required: true
        type: choice
        options:
          - connected-web-dev
        default: connected-web-dev
      instance_id:
        description: "Deployment instance ID"
        required: true
        type: string
        default: template-api-prerelease
      version:
        description: "Optional package version override (defaults to 0.0.0-dev.<run_number>)"
        required: false
        type: string
      deploy_enabled:
        description: "Deploy package after publish"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  package-prerelease:
    name: Pack/Publish/Deploy pre-release
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CWEB_CLIENT_ID: ${{ secrets.CWEB_CLIENT_ID }}
      CWEB_CLIENT_SECRET: ${{ secrets.CWEB_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node JS LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://npm.pkg.github.com
          scope: '@connected-web'

      - name: Install dependencies
        run: npm ci

      - name: Install cweb CLI
        run: npm install -g @connected-web/cweb

      - name: Resolve version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "PACKAGE_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "PACKAGE_VERSION=0.0.0-dev.${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Resolve profile for account
        run: |
          case "${{ github.event.inputs.account }}" in
            connected-web-dev)
              echo "TARGET_PROFILE=dev" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported account: ${{ github.event.inputs.account }}" >&2
              exit 1
              ;;
          esac

      - name: Read account config
        working-directory: ./.github/workflows/scripts
        run: sh ./setupGithubEnvironment.sh "${{ github.event.inputs.account }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ConnectedWebGithub-template-api
          role-session-name: template-api-package-prerelease
          role-duration-seconds: 3600

      - name: Resolve Cognito user pool id
        run: |
          set -euo pipefail
          ACCOUNT_CONFIG_JSON="$(echo "$AWS_ACCOUNT_CONFIG" | base64 -d)"
          USER_POOL_ID="$(jq -r '.identity.verifiers[0].userPoolId // empty' <<<"$ACCOUNT_CONFIG_JSON")"
          if [ -z "$USER_POOL_ID" ]; then
            echo "Unable to resolve identity.verifiers[0].userPoolId from AWS_ACCOUNT_CONFIG" >&2
            exit 1
          fi

          echo "CWEB_USER_POOL_ID=$USER_POOL_ID" >> "$GITHUB_ENV"

      - name: Resolve deploy config
        run: |
          set -euo pipefail
          ACCOUNT_CONFIG_JSON="$(echo "$AWS_ACCOUNT_CONFIG" | base64 -d)"
          OAUTH_URL="$(jq -r '.identity.verifiers[0].oauthUrl // empty' <<<"$ACCOUNT_CONFIG_JSON")"
          USER_POOL_ID="$(jq -r '.identity.verifiers[0].userPoolId // empty' <<<"$ACCOUNT_CONFIG_JSON")"
          CLIENT_ID="$(jq -r '.identity.verifiers[0].clientId // empty' <<<"$ACCOUNT_CONFIG_JSON")"
          HOSTED_ZONE_DOMAIN="$(jq -r '.hostedZoneDomain // empty' <<<"$ACCOUNT_CONFIG_JSON")"

          if [ -z "$OAUTH_URL" ] || [ -z "$USER_POOL_ID" ] || [ -z "$CLIENT_ID" ] || [ -z "$HOSTED_ZONE_DOMAIN" ]; then
            echo "Unable to resolve deploy config values from AWS_ACCOUNT_CONFIG" >&2
            exit 1
          fi

          DEPLOY_SUBDOMAIN="${{ github.event.inputs.instance_id }}"
          echo "DEPLOY_CONFIG={\"Subdomain\":\"$DEPLOY_SUBDOMAIN\",\"HostedZoneDomain\":\"$HOSTED_ZONE_DOMAIN\",\"COGNITO_USER_POOL_ID\":\"$USER_POOL_ID\",\"COGNITO_USER_POOL_CLIENT_ID\":\"$CLIENT_ID\",\"IDENTITY_OAUTH_URL\":\"$OAUTH_URL\"}" >> "$GITHUB_ENV"

      - name: Login cweb machine identity
        run: cweb login -p "$TARGET_PROFILE" --user-pool-id "$CWEB_USER_POOL_ID" --get-access-token --machine > /dev/null

      - name: Pack template-api package
        run: cweb -p "$TARGET_PROFILE" --user-pool-id "$CWEB_USER_POOL_ID" package pack --component template-api --version "$PACKAGE_VERSION"

      - name: Publish template-api package
        run: cweb -p "$TARGET_PROFILE" --user-pool-id "$CWEB_USER_POOL_ID" package publish --component template-api --version "$PACKAGE_VERSION"

      - name: Deploy template-api package
        if: ${{ github.event.inputs.deploy_enabled == 'true' }}
        run: |
          cweb -p "$TARGET_PROFILE" --user-pool-id "$CWEB_USER_POOL_ID" package deploy \
            --host remote \
            --component template-api \
            --version "$PACKAGE_VERSION" \
            --instance-id "${{ github.event.inputs.instance_id }}" \
            --config "$DEPLOY_CONFIG"
