name: Package Pre-release

on:
  workflow_dispatch:
    inputs:
      account:
        description: "Target AWS account alias"
        required: true
        type: choice
        options:
          - connected-web-dev
        default: connected-web-dev
      instance_id:
        description: "Deployment instance ID"
        required: true
        type: string
        default: template-api-prerelease
      version:
        description: "Optional package version override (defaults to 0.0.0-dev.<run_number>)"
        required: false
        type: string
      deploy_enabled:
        description: "Deploy package after publish"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: read

jobs:
  package-prerelease:
    name: Pack/Publish/Deploy pre-release
    runs-on: ubuntu-latest
    environment: dev
    env:
      NODE_AUTH_TOKEN: ${{ secrets.CONNECTED_WEB_PACKAGES_TOKEN }}
      CWEB_CLIENT_ID: ${{ secrets.CWEB_CLIENT_ID }}
      CWEB_CLIENT_SECRET: ${{ secrets.CWEB_CLIENT_SECRET }}
      CWEB_CLIENT_TYPE: ${{ secrets.CWEB_CLIENT_TYPE }}
      CWEB_ACCOUNTS_DIR: ${{ github.workspace }}/.github/workflows/accounts

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node JS LTS
        uses: actions/setup-node@v5
        with:
          node-version: 20.x
          registry-url: https://npm.pkg.github.com
          scope: '@connected-web'

      - name: Install dependencies
        run: npm ci

      - name: Install cweb CLI
        run: npm install -g @connected-web/cweb

      - name: Resolve version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "PACKAGE_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "PACKAGE_VERSION=0.0.0-dev.${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Resolve profile for account
        run: |
          case "${{ github.event.inputs.account }}" in
            connected-web-dev)
              echo "TARGET_PROFILE=dev" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported account: ${{ github.event.inputs.account }}" >&2
              exit 1
              ;;
          esac

      - name: Resolve account config from cweb profile
        run: cweb configure -p "$TARGET_PROFILE" --write-github-env

      - name: Login cweb machine identity
        run: cweb login -p "$TARGET_PROFILE" --user-pool-id "$USER_POOL_ID" --get-access-token --machine > /dev/null

      - name: Resolve deploy config
        run: |
          set -euo pipefail
          if jq -e . >/dev/null 2>&1 <<<"$AWS_ACCOUNT_CONFIG"; then
            ACCOUNT_CONFIG_JSON="$AWS_ACCOUNT_CONFIG"
          else
            ACCOUNT_CONFIG_JSON="$(echo "$AWS_ACCOUNT_CONFIG" | base64 -d)"
          fi
          AUTHORIZER_ARN="${IDENTITY_AUTHORIZER_ARN:-}"
          HOSTED_ZONE_DOMAIN="$(jq -r '.hostedZoneDomain // empty' <<<"$ACCOUNT_CONFIG_JSON")"
          HOSTED_ZONE_ID="$(jq -r '.hostedZoneId // empty' <<<"$ACCOUNT_CONFIG_JSON")"

          if [ -n "${MANAGEMENT_AWS_ACCOUNT_CONFIG:-}" ]; then
            MANAGEMENT_CONFIG_JSON="$(echo "$MANAGEMENT_AWS_ACCOUNT_CONFIG" | base64 -d)"
            if [ -z "$HOSTED_ZONE_DOMAIN" ]; then
              HOSTED_ZONE_DOMAIN="$(jq -r '.hostedZoneDomain // empty' <<<"$MANAGEMENT_CONFIG_JSON")"
            fi
            if [ -z "$HOSTED_ZONE_ID" ]; then
              HOSTED_ZONE_ID="$(jq -r '.hostedZoneId // empty' <<<"$MANAGEMENT_CONFIG_JSON")"
            fi
          fi

          if [ -z "$HOSTED_ZONE_DOMAIN" ]; then
            PREFIX="$(jq -r '.prefix // empty' <<<"$ACCOUNT_CONFIG_JSON")"
            PARENT_ZONE="$(jq -r '.parentZone // empty' <<<"$ACCOUNT_CONFIG_JSON")"
            if [ -n "$PREFIX" ] && [ -n "$PARENT_ZONE" ]; then
              HOSTED_ZONE_DOMAIN="$PREFIX.$PARENT_ZONE"
            fi
          fi

          if [ -z "$HOSTED_ZONE_DOMAIN" ] || [ -z "$AUTHORIZER_ARN" ]; then
            echo "Unable to resolve required deploy config values (HostedZoneDomain / identity.authorizerArn)." >&2
            echo "Expected cweb configure to provide IDENTITY_AUTHORIZER_ARN and hosted zone metadata." >&2
            exit 1
          fi

          DEPLOY_SUBDOMAIN="${{ github.event.inputs.instance_id }}"
          DEPLOY_CONFIG_JSON="$(jq -cn \
            --arg subdomain "$DEPLOY_SUBDOMAIN" \
            --arg hostedZoneDomain "$HOSTED_ZONE_DOMAIN" \
            --arg hostedZoneId "$HOSTED_ZONE_ID" \
            --arg authorizerArn "$AUTHORIZER_ARN" \
            '{
              Subdomain: $subdomain,
              HostedZoneDomain: $hostedZoneDomain,
              IDENTITY_AUTHORIZER_ARN: $authorizerArn
            }
            + (if ($hostedZoneId | length) > 0 then { HostedZoneId: $hostedZoneId } else {} end)')"
          echo "DEPLOY_CONFIG=$DEPLOY_CONFIG_JSON" >> "$GITHUB_ENV"

      - name: Pack template-api package
        run: cweb -p "$TARGET_PROFILE" --user-pool-id "$USER_POOL_ID" package pack --component template-api --version "$PACKAGE_VERSION"

      - name: Publish template-api package
        run: cweb -p "$TARGET_PROFILE" --user-pool-id "$USER_POOL_ID" package publish --component template-api --version "$PACKAGE_VERSION"

      - name: Deploy template-api package
        if: ${{ github.event.inputs.deploy_enabled == 'true' }}
        run: |
          cweb -p "$TARGET_PROFILE" --user-pool-id "$USER_POOL_ID" package deploy \
            --host remote \
            --component template-api \
            --version "$PACKAGE_VERSION" \
            --instance-id "${{ github.event.inputs.instance_id }}" \
            --config "$DEPLOY_CONFIG"
